name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  VITE_API_URL: http://47.98.111.86:8088
  VITE_BASE_URL: /api
  OPTIMIZE_IMG: true   # 触发图片优化（对应你 vite.config 里的判断）

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm  # 已经缓存 pnpm store，保留即可

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 类型检查和构建并发跑，节省时间
      # typecheck 不产出文件，build 不做类型检查，两者互不干扰
      - name: Typecheck & Build
        run: |
          pnpm typecheck &
          TYPECHECK_PID=$!
          pnpm build
          wait $TYPECHECK_PID  # 等类型检查结束，任一失败则 step 失败

      - name: Deploy dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 47.98.111.86
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          source: dist/*
          target: ${{ secrets.SERVER_DEPLOY_PATH }}
          strip_components: 1
          overwrite: true
          rm: true